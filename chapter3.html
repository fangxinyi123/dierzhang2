<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第三章 - 基础图表交互式平台</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
            min-height: 100vh;
            padding: 0;
            margin: 0;
        }
        
        .container {
            width: 100%;
            max-width: 100%;
            margin: 0;
            padding: 0;
        }
        
        .header {
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
            color: white;
            text-align: center;
            padding: 60px 20px;
            margin-bottom: 0;
        }
        
        .header h1 {
            font-size: 3em;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .header p {
            font-size: 1.4em;
            opacity: 0.9;
        }
        
        .description {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            margin: 0;
            border-bottom: 3px solid #27ae60;
        }
        
        .description h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.8em;
        }
        
        .description p {
            line-height: 1.8;
            color: #555;
            font-size: 1.2em;
        }
        
        .chart-section {
            padding: 40px 20px;
            background: white;
            margin: 0;
        }
        
        .chart-title {
            text-align: center;
            color: #2c3e50;
            font-size: 2.2em;
            margin-bottom: 30px;
            font-weight: bold;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            margin: 20px 0;
        }
        
        .chart-container {
            width: 100%;
            height: 600px;
            margin: 30px 0;
            padding: 0;
            background: white;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.2em;
            }
            
            .chart-container {
                height: 450px;
                margin: 20px 0;
            }
            
            .chart-title {
                font-size: 1.8em;
                margin: 15px 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 第三章 - 基础图表交互式平台</h1>
            <p>5种基础图表类型的平铺展示与交互式浏览</p>
        </div>
        
        <div class="description">
            <h3>📋 第三章核心技术要点</h3>
            <p>第三章展示了基于Chart.js的5种基础交互式图表，包括正弦余弦函数曲线、电影票房排行、支付宝月账单、汽车速度分析和英语成绩对比等实用案例。每个图表都支持鼠标悬停、缩放、数据查看等交互功能。</p>
        </div>
        
        <div class="chart-section">
            <div class="chart-title">📈 正弦余弦函数曲线</div>
            <div class="chart-container">
                <canvas id="sinCosChart"></canvas>
            </div>
        </div>
        
        <div class="chart-section">
            <div class="chart-title">🎬 电影票房排行</div>
            <div class="chart-container">
                <canvas id="movieChart"></canvas>
            </div>
        </div>
        
        <div class="chart-section">
            <div class="chart-title">💳 支付宝月账单</div>
            <div class="chart-container">
                <canvas id="alipayChart"></canvas>
            </div>
        </div>
        
        <div class="chart-section">
            <div class="chart-title">🚗 汽车速度分析</div>
            <div class="chart-container">
                <canvas id="carChart"></canvas>
            </div>
        </div>
        
        <div class="chart-section">
            <div class="chart-title">📚 英语成绩对比</div>
            <div class="chart-container">
                <canvas id="englishChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // 正弦余弦函数曲线
        const sinCosCtx = document.getElementById('sinCosChart').getContext('2d');
        const sinCosChart = new Chart(sinCosCtx, {
            type: 'line',
            data: {
                labels: Array.from({length: 101}, (_, i) => (-Math.PI + 2 * Math.PI * i / 100).toFixed(2)),
                datasets: [
                    {
                        label: 'sin(x)',
                        data: Array.from({length: 101}, (_, i) => Math.sin(-Math.PI + 2 * Math.PI * i / 100)),
                        borderColor: '#e74c3c',
                        backgroundColor: 'rgba(231, 76, 60, 0.1)',
                        borderWidth: 3,
                        fill: false,
                        tension: 0.4
                    },
                    {
                        label: 'cos(x)',
                        data: Array.from({length: 101}, (_, i) => Math.cos(-Math.PI + 2 * Math.PI * i / 100)),
                        borderColor: '#3498db',
                        backgroundColor: 'rgba(52, 152, 219, 0.1)',
                        borderWidth: 3,
                        fill: false,
                        tension: 0.4
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        title: {
                            display: true,
                            text: 'x值（弧度）',
                            font: {size: 14, weight: 'bold'}
                        }
                    },
                    y: {
                        title: {
                            display: true,
                            text: '函数值',
                            font: {size: 14, weight: 'bold'}
                        },
                        suggestedMin: -1.5,
                        suggestedMax: 1.5
                    }
                },
                plugins: {
                    legend: {
                        position: 'top',
                        labels: {
                            font: {size: 14}
                        }
                    }
                }
            }
        });

        // 电影票房排行
        const movieCtx = document.getElementById('movieChart').getContext('2d');
        const movieChart = new Chart(movieCtx, {
            type: 'bar',
            data: {
                labels: ['哪吒之魔童降世', '流浪地球', '复仇者联盟4', '我和我的祖国', '中国机长', '疯狂的外星人', '飞驰人生', '烈火英雄', '少年的你', '速度与激情：特别行动'],
                datasets: [{
                    label: '票房（亿元）',
                    data: [50.03, 46.86, 42.5, 31.7, 29.12, 22.13, 17.28, 17.07, 15.58, 14.34],
                    backgroundColor: '#27ae60',
                    borderColor: '#2c3e50',
                    borderWidth: 2,
                    borderRadius: 5
                }]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        title: {
                            display: true,
                            text: '票房（亿元）',
                            font: {size: 14, weight: 'bold'}
                        }
                    },
                    y: {
                        title: {
                            display: true,
                            text: '电影名称',
                            font: {size: 14, weight: 'bold'}
                        }
                    }
                },
                plugins: {
                    legend: {
                        position: 'top',
                        labels: {
                            font: {size: 14}
                        }
                    }
                }
            }
        });

        // 支付宝月账单
        const alipayCtx = document.getElementById('alipayChart').getContext('2d');
        const alipayChart = new Chart(alipayCtx, {
            type: 'pie',
            data: {
                labels: ['购物消费', '餐饮美食', '交通出行', '娱乐休闲', '生活缴费', '其他'],
                datasets: [{
                    data: [35, 25, 15, 10, 8, 7],
                    backgroundColor: [
                        '#e74c3c', '#3498db', '#2ecc71', '#f39c12', '#9b59b6', '#34495e'
                    ],
                    borderWidth: 3,
                    borderColor: '#ffffff'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'right',
                        labels: {
                            font: {size: 14}
                        }
                    }
                }
            }
        });

        // 汽车速度分析
        const carCtx = document.getElementById('carChart').getContext('2d');
        const carChart = new Chart(carCtx, {
            type: 'scatter',
            data: {
                datasets: [{
                    label: '速度与制动距离',
                    data: [
                        {x: 20, y: 6}, {x: 30, y: 14}, {x: 40, y: 24}, {x: 50, y: 38}, 
                        {x: 60, y: 55}, {x: 70, y: 75}, {x: 80, y: 98}, {x: 90, y: 125}
                    ],
                    backgroundColor: '#e67e22',
                    borderColor: '#d35400',
                    borderWidth: 2,
                    pointRadius: 8,
                    pointHoverRadius: 12
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        title: {
                            display: true,
                            text: '速度 (km/h)',
                            font: {size: 14, weight: 'bold'}
                        }
                    },
                    y: {
                        title: {
                            display: true,
                            text: '制动距离 (米)',
                            font: {size: 14, weight: 'bold'}
                        }
                    }
                },
                plugins: {
                    legend: {
                        position: 'top',
                        labels: {
                            font: {size: 14}
                        }
                    }
                }
            }
        });

        // 英语成绩对比
        const englishCtx = document.getElementById('englishChart').getContext('2d');
        const englishChart = new Chart(englishCtx, {
            type: 'bar',
            data: {
                labels: ['1班', '2班', '3班', '4班', '5班', '6班'],
                datasets: [
                    {
                        label: '上学期',
                        data: [85, 78, 92, 88, 76, 90],
                        backgroundColor: '#3498db',
                        borderColor: '#2980b9',
                        borderWidth: 2,
                        borderRadius: 5
                    },
                    {
                        label: '下学期',
                        data: [88, 82, 95, 91, 80, 93],
                        backgroundColor: '#e74c3c',
                        borderColor: '#c0392b',
                        borderWidth: 2,
                        borderRadius: 5
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        title: {
                            display: true,
                            text: '班级',
                            font: {size: 14, weight: 'bold'}
                        }
                    },
                    y: {
                        title: {
                            display: true,
                            text: '平均分数',
                            font: {size: 14, weight: 'bold'}
                        },
                        suggestedMin: 70,
                        suggestedMax: 100
                    }
                },
                plugins: {
                    legend: {
                        position: 'top',
                        labels: {
                            font: {size: 14}
                        }
                    }
                }
            }
        });

        // 响应式调整
        window.addEventListener('resize', function() {
            sinCosChart.resize();
            movieChart.resize();
            alipayChart.resize();
            carChart.resize();
            englishChart.resize();
        });
    </script>
</body>
</html>
